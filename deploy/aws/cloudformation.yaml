# -----------------------------------------------------------------------------
# S3 + CloudFront for Vue SPA (history mode). Deploy with:
#   aws cloudformation deploy --template-file deploy/aws/cloudformation.yaml \
#     --stack-name european-remodeling-site \
#     --parameter-overrides BucketName=YOUR-UNIQUE-BUCKET-NAME
# Stack can be created in any region (e.g. us-east-1). Bucket is created in that region.
# -----------------------------------------------------------------------------

AWSTemplateFormatVersion: '2010-09-09'
Description: European Remodeling marketing site — private S3 + CloudFront with SPA fallback (403/404 → index.html)

Parameters:
  BucketName:
    Type: String
    Description: Globally unique S3 bucket name (lowercase, e.g. european-remodeling-site-andreea)

Resources:
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  WebsiteOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        Description: OAC for European Remodeling SPA
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: European Remodeling SPA
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebsiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt WebsiteOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

Outputs:
  BucketName:
    Description: Upload `dist/` here with npm run deploy:s3
    Value: !Ref WebsiteBucket
  CloudFrontURL:
    Description: Public site URL (use this in portfolio / DNS)
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  DistributionId:
    Description: Set CLOUDFRONT_DISTRIBUTION_ID for cache invalidation after deploy
    Value: !Ref CloudFrontDistribution
